apiVersion: v1
kind: Service
metadata:
  name: vector-cache
  namespace: default
  labels:
    app: vector-cache
    component: cache-optimizer
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: vector-cache
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 9090
    targetPort: 9090
    protocol: TCP
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: v1
kind: Service
metadata:
  name: vector-cache-headless
  namespace: default
  labels:
    app: vector-cache
    component: cache-optimizer
spec:
  selector:
    app: vector-cache
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  clusterIP: None
  type: ClusterIP