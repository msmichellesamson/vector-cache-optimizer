apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vector-cache-monitor
  namespace: default
  labels:
    app: vector-cache
    component: monitoring
spec:
  selector:
    matchLabels:
      app: vector-cache
      component: cache-optimizer
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
  - port: http
    path: /health
    interval: 60s
    scrapeTimeout: 5s
  namespaceSelector:
    matchNames:
    - default
  jobLabel: app
  targetLabels:
  - app
  - component