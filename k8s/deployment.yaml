apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-cache-optimizer
  namespace: default
  labels:
    app: vector-cache-optimizer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vector-cache-optimizer
  template:
    metadata:
      labels:
        app: vector-cache-optimizer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: vector-cache-optimizer
        image: gcr.io/PROJECT_ID/vector-cache-optimizer:latest
        ports:
        - containerPort: 8080
          name: http-metrics
        - containerPort: 8000
          name: http-api
        env:
        - name: CONFIG_PATH
          value: "/app/config/app.yaml"
        - name: REDIS_HOST
          value: "redis-cluster"
        - name: REDIS_PORT
          value: "6379"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: vector-cache-optimizer-config